<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parabéns Para Você 🎉</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="hero">
        <div class="particles"></div>
        <h1>🎉 PARABÉNS PARA VOCÊ 🎉</h1>
        <p class="subtitle">
            Hoje é um dia especial ❤️
        </p>
        <a href="#mensagem" class="btn">
            Ver Surpresa ↓
        </a>
    </header>
    <main>
        <section id="mensagem" class="card">
            <h2>Uma pequena mensagem</h2>
            <p>
                [ESCREVA SUA MENSAGEM DE ANIVERSÁRIO AQUI]
            </p>
        </section>
        <section class="card">
            <h2>❤️ Um pequeno recadinho especial</h2>
            <div class="video-container">
                <video controls id="video">
                    <source src="./assets/video/recado.mp4" type="video/mp4">
                    Seu navegador não suporta vídeo.
                </video>
            </div>
            <a class="download-btn" href="./assets/video/recado.mp4" download>
                ⬇ Baixar vídeo
            </a>
        </section>
        <section class="card">
            <h2>Nossos Momentos</h2>
            <div class="carousel">
                <button class="nav prev"> ❮ </button>
                <div class="slides">
                    <img src="./assets/images/foto (1).jpg">
                    <img src="./assets/images/foto (2).jpg">
                    <img src="./assets/images/foto (3).jpg">
                    <img src="./assets/images/foto (4).jpg">
                    <img src="./assets/images/foto (5).jpg">
                    <img src="./assets/images/foto (6).jpg">
                </div>
                <button class="nav next"> ❯ </button>
            </div>
            <div class="dots"></div>
        </section>
    </main>
    <footer>
        <h2>até o próximo ano…</h2>
        <p>Obrigado por existir.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
